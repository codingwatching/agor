version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 6
    groups:
      core-runtime:
        patterns:
          - '@feathersjs/*'
          - '@octokit/*'
          - '@libsql/*'
          - 'drizzle-*'
          - 'express'
          - 'socket.io'
          - 'socket.io-client'
          - 'simple-git'
          - 'postgres'
          - 'zod'
        update-types:
          - 'minor'
          - 'patch'
      agent-sdks:
        patterns:
          - '@anthropic-ai/*'
          - '@openai/*'
          - '@google/*'
          - '@github/*'
          - '@opencode-ai/*'
          - '@modelcontextprotocol/*'
        update-types:
          - 'minor'
          - 'patch'
      dev-tooling:
        dependency-type: 'development'
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # agor-live-only deps are managed manually when packaging/releasing
      - dependency-name: 'md-to-slack'
      - dependency-name: 'uuidv7'
