name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'apps/agor-docs/**'
      - '*.md'
      - 'context/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'apps/agor-docs/**'
      - '*.md'
      - 'context/**'

env:
  PNPM_VERSION: '9.15.1'
  NODE_VERSION: '22'
  TURBO_CACHE_KEY: turbo-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ github.sha }}

jobs:
  install:
    name: Install & Build deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Build all packages to populate turbo cache for parallel jobs
      - run: pnpm turbo run build --filter='!@agor/docs'

      - name: Save turbo cache
        uses: actions/cache/save@v4
        with:
          path: .turbo/cache
          key: ${{ env.TURBO_CACHE_KEY }}

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Restore turbo cache
        uses: actions/cache/restore@v4
        with:
          path: .turbo/cache
          key: ${{ env.TURBO_CACHE_KEY }}

      - run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Restore turbo cache
        uses: actions/cache/restore@v4
        with:
          path: .turbo/cache
          key: ${{ env.TURBO_CACHE_KEY }}

      - run: pnpm check:agor-live-deps

      - run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Restore turbo cache
        uses: actions/cache/restore@v4
        with:
          path: .turbo/cache
          key: ${{ env.TURBO_CACHE_KEY }}

      - run: pnpm turbo run build --filter='!@agor/docs'

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [install]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Restore turbo cache
        uses: actions/cache/restore@v4
        with:
          path: .turbo/cache
          key: ${{ env.TURBO_CACHE_KEY }}

      - run: pnpm turbo run test --filter=agor-ui --filter=@agor/daemon
